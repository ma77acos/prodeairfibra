#                    LOGGING
# ============================================================
logging.level.com.reservas=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=ERROR

logging.level.org.springframework.orm.jpa=WARN
logging.level.org.hibernate.tool.schema=WARN
logging.level.org.hibernate.tool.hbm2ddl=WARN
logging.level.org.hibernate.engine.jdbc=WARN
logging.level.com.zaxxer.hikari=WARN

logging.file.name=/var/log/apps/prode-airfibra/app.log
logging.logback.rollingpolicy.max-file-size=10MB
